# base values and reference chains
<section name=base>
   <field name=n>-7</field>
   <field name=msg>"hello world"</field>
   <field name=copy>$n</field>      # local reference
   <field name=chain>$copy</field>  # chain: chain -> copy -> n
</section>

<section name=other>
   <field name=remote>$base.chain</field> # cross-section chain
   <field name=flag>false</field>
   <field name=viaflag>$flag</field>
</section>
